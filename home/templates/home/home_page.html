{% extends "collective/base.html" %}
{% load wagtailcore_tags %}
{% block content %}
<section class="home">
    <h1>{{ page.title }}<br><em>{{ page.tagline }}</em></h1>
    {% if page.intro %}
    <div class="home-intro rich-text">{{ page.intro|richtext }}</div>
    {% endif %}
    <div class="home-links">
        {% for link in page.links.all %}
        <a href="{{ link.url }}">{{ link.label }}</a>
        {% endfor %}
    </div>
</section>
{% endblock %}
